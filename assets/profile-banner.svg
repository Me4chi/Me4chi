<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Me4chi — Game, Desktop and Web Developer</title>
  <desc id="desc">Japanese pixel-art forest banner with wood, bamboo and cherry blossom details.</desc>
  <defs>
    <linearGradient id="forest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#061711"/>
      <stop offset="1" stop-color="#0b281b"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#70482a"/>
      <stop offset=".55" stop-color="#3a2417"/>
      <stop offset="1" stop-color="#20150e"/>
    </linearGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0H0V20" fill="none" stroke="#f2dda6" stroke-opacity=".035"/>
    </pattern>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .petal{animation:fall 8s linear infinite}.p2{animation-delay:-3s}.p3{animation-delay:-6s}
      .firefly{animation:blink 2s steps(2) infinite}.f2{animation-delay:-1s}
      @keyframes fall{to{transform:translate(55px,390px) rotate(360deg)}}
      @keyframes blink{50%{opacity:.2}}
    </style>
  </defs>

  <rect width="1200" height="360" rx="8" fill="url(#forest)"/>
  <rect width="1200" height="360" rx="8" fill="url(#grid)"/>
  <circle cx="600" cy="155" r="190" fill="#17442b" opacity=".24"/>

  <path d="M0 0h1200v38H0zM0 322h1200v38H0z" fill="url(#wood)"/>
  <path d="M0 34h1200v6H0zM0 320h1200v6H0z" fill="#d0ae67" opacity=".72"/>
  <path d="M16 10h1168v18H16zM16 332h1168v18H16z" fill="none" stroke="#8a5d32" stroke-width="3"/>

  <g opacity=".95">
    <path d="M0 72h175v18H0zM0 92h120v15H0z" fill="#3a2417"/>
    <path d="M1025 72h175v18h-175zM1080 92h120v15h-120z" fill="#3a2417"/>
    <path d="M0 66h185v8H0zM1015 66h185v8h-185z" fill="#d0ae67" opacity=".55"/>
  </g>

  <g fill="#315832">
    <rect x="42" y="34" width="17" height="288"/><rect x="76" y="34" width="12" height="288"/>
    <rect x="1142" y="34" width="17" height="288"/><rect x="1113" y="34" width="12" height="288"/>
  </g>
  <g fill="#91ad55" opacity=".65">
    <rect x="40" y="82" width="21" height="5"/><rect x="40" y="156" width="21" height="5"/><rect x="40" y="232" width="21" height="5"/>
    <rect x="1139" y="82" width="21" height="5"/><rect x="1139" y="156" width="21" height="5"/><rect x="1139" y="232" width="21" height="5"/>
  </g>

  <g fill="#e97f91">
    <rect x="102" y="58" width="10" height="10"/><rect x="114" y="48" width="9" height="9"/><rect x="127" y="61" width="8" height="8"/>
    <rect x="1082" y="55" width="10" height="10"/><rect x="1066" y="46" width="9" height="9"/><rect x="1054" y="63" width="8" height="8"/>
    <rect x="155" y="88" width="8" height="8"/><rect x="1034" y="90" width="8" height="8"/>
  </g>
  <path d="M0 44h82l71 55" fill="none" stroke="#6b3d26" stroke-width="9"/>
  <path d="M1200 44h-82l-71 55" fill="none" stroke="#6b3d26" stroke-width="9"/>

  <g transform="translate(110 118)" filter="url(#glow)">
    <rect width="78" height="92" fill="#3a2417"/>
    <rect x="10" y="10" width="58" height="66" fill="#d0ae67"/>
    <rect x="16" y="16" width="46" height="54" fill="#f2dda6"/>
    <path d="M10 30h58M10 52h58M28 10v66M49 10v66" stroke="#70482a" stroke-width="5"/>
  </g>
  <g transform="translate(1012 118)" filter="url(#glow)">
    <rect width="78" height="92" fill="#3a2417"/>
    <rect x="10" y="10" width="58" height="66" fill="#d0ae67"/>
    <rect x="16" y="16" width="46" height="54" fill="#f2dda6"/>
    <path d="M10 30h58M10 52h58M28 10v66M49 10v66" stroke="#70482a" stroke-width="5"/>
  </g>

  <g text-anchor="middle" font-family="monospace">
    <text x="600" y="155" fill="#f2dda6" font-size="78" font-weight="900" letter-spacing="11">ME4CHI</text>
    <text x="600" y="205" fill="#d0ae67" font-size="18" font-weight="700" letter-spacing="5">GAME • DESKTOP • WEB DEVELOPER</text>
    <text x="600" y="251" fill="#91ad55" font-size="16" letter-spacing="8">UNITY  ◆  GODOT  ◆  C#  ◆  JAVASCRIPT</text>
    <rect x="420" y="278" width="285" height="5" fill="#e97f91"/>
    <rect x="713" y="278" width="67" height="5" fill="#d0ae67"/>
  </g>

  <g class="firefly" fill="#d0ae67"><rect x="246" y="145" width="6" height="6"/><rect x="925" y="238" width="5" height="5"/></g>
  <g class="firefly f2" fill="#91ad55"><rect x="285" y="264" width="5" height="5"/><rect x="897" y="112" width="6" height="6"/></g>
  <g class="petal" fill="#e97f91"><rect x="340" y="-12" width="10" height="7"/></g>
  <g class="petal p2" fill="#f3a7b5"><rect x="710" y="-12" width="10" height="7"/></g>
  <g class="petal p3" fill="#e97f91"><rect x="850" y="-12" width="10" height="7"/></g>

  <rect x="7" y="7" width="1186" height="346" rx="5" fill="none" stroke="#d0ae67" stroke-width="3"/>
  <path d="M7 36h29V7M1193 36h-29V7M7 324h29v29M1193 324h-29v29" fill="none" stroke="#e97f91" stroke-width="6"/>
</svg>
